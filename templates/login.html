{% extends "base.html" %}

{% block title %}Login - Predictions Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Login</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                        <div class="form-text">Enter your username (will be created if new)</div>
                    </div>
                    <div class="mb-3">
                        <label for="display_name" class="form-label">Display Name (Optional)</label>
                        <input type="text" class="form-control" id="display_name" name="display_name">
                        <div class="form-text">How you want to be displayed (defaults to username)</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <small class="text-muted">No password required - simple username login</small>
        </div>
    </div>
</div>
{% endblock %}
