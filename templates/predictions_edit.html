{% extends "base.html" %}

{% block title %}Edit Prediction - Predictions Tracker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Edit Prediction</h1>

        <div class="card">
            <div class="card-body">
                <div class="mb-4">
                    <h5 class="card-title">Question:</h5>
                    <p class="lead">{{ question.question_text }}</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Your Prediction</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="answer" id="answer_yes" value="yes"
                                {% if prediction.answer == 'yes' %}checked{% endif %} required>
                            <label class="btn btn-outline-success" for="answer_yes">YES</label>

                            <input type="radio" class="btn-check" name="answer" id="answer_no" value="no"
                                {% if prediction.answer == 'no' %}checked{% endif %} required>
                            <label class="btn btn-outline-danger" for="answer_no">NO</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confidence" class="form-label">Confidence Level</label>
                        <select class="form-select" id="confidence" name="confidence" required>
                            <option value="1" {% if prediction.confidence|int == 1 %}selected{% endif %}>1 - Very Low</option>
                            <option value="2" {% if prediction.confidence|int == 2 %}selected{% endif %}>2 - Low</option>
                            <option value="3" {% if prediction.confidence|int == 3 %}selected{% endif %}>3 - Medium</option>
                            <option value="4" {% if prediction.confidence|int == 4 %}selected{% endif %}>4 - High</option>
                            <option value="5" {% if prediction.confidence|int == 5 %}selected{% endif %}>5 - Very High</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes / Reasoning (Optional)</label>
                        <textarea class="form-control" id="notes" name="notes" rows="4" placeholder="Why do you think this will happen? What's your reasoning?">{{ prediction.notes }}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Prediction</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
